<div class="col-md-6 col-lg-4">
  <div class="card card-hover border-0 shadow-sm h-100">
    <div class="card-body d-flex align-items-start gap-3">
      <i class="bi bi-file-earmark-text-fill fs-2 text-danger flex-shrink-0 mt-1"></i>
      <div>
        <p class="fw-semibold mb-1 text-dark">{{ doc.title }}</p>
        {% if doc.description %}
        <p class="text-muted small mb-0">{{ doc.description }}</p>
        {% endif %}
      </div>
    </div>
    <div class="card-footer bg-transparent border-0 pt-0 pb-3 d-flex gap-2 flex-wrap">
      {% if doc.has_content %}
      <a href="{{ doc.get_absolute_url }}" class="btn btn-sm btn-danger">
        <i class="bi bi-eye me-1"></i>Leggi
      </a>
      {% endif %}
      {% if doc.has_file %}
      <a href="{% url 'document_download' doc.slug %}" class="btn btn-sm btn-outline-danger">
        <i class="bi bi-download me-1"></i>Scarica PDF
      </a>
      {% elif doc.has_content %}
      <a href="{{ doc.get_absolute_url }}" class="btn btn-sm btn-outline-danger">
        <i class="bi bi-printer me-1"></i>Salva PDF
      </a>
      {% endif %}
      {% if not doc.has_content and not doc.has_file %}
      <span class="btn btn-sm btn-outline-secondary disabled">Non disponibile</span>
      {% endif %}
    </div>
  </div>
</div>
